<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEATHMATCH 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Share Tech Mono', monospace;
    color: #fff;
    overflow: hidden;
    user-select: none;
  }

  #canvas { display: block; width: 100vw; height: 100vh; }

  /* ── HUD ── */
  #hud {
    position: fixed; inset: 0; pointer-events: none;
    display: none;
  }

  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 24px; height: 24px;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute;
    background: rgba(255,255,255,0.9);
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
  #crosshair.hit { filter: drop-shadow(0 0 6px #f44) brightness(2); }

  #healthbar-wrap {
    position: absolute; bottom: 30px; left: 30px;
    display: flex; flex-direction: column; gap: 6px;
  }
  #health-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 3px; color: #aaa;
  }
  #healthbar {
    width: 200px; height: 14px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 2px; overflow: hidden;
  }
  #healthfill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #f44, #f84);
    transition: width 0.15s, background 0.3s;
  }

  #ammo-display {
    position: absolute; bottom: 30px; right: 30px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px; line-height: 1;
    color: #fff; text-shadow: 0 0 20px rgba(255,100,100,0.5);
  }
  #ammo-display span { font-size: 22px; color: #888; }

  #killfeed {
    position: absolute; top: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 6px;
    align-items: flex-end; width: 320px;
  }
  .killfeed-entry {
    background: rgba(0,0,0,0.7);
    border-left: 3px solid #f44;
    padding: 5px 10px;
    font-size: 12px; letter-spacing: 1px;
    animation: kfSlide 0.2s ease-out, kfFade 0.5s 2.5s forwards;
    max-width: 100%;
  }
  @keyframes kfSlide { from { transform: translateX(20px); opacity: 0; } }
  @keyframes kfFade  { to { opacity: 0; transform: translateX(10px); } }

  #scoreboard {
    position: absolute; top: 20px; left: 20px;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 12px 16px; min-width: 180px;
    font-size: 12px; letter-spacing: 1px;
  }
  #scoreboard h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 4px;
    color: #f84; margin-bottom: 8px;
    border-bottom: 1px solid rgba(255,120,0,0.3); padding-bottom: 4px;
  }
  .score-row { display: flex; justify-content: space-between; gap: 16px; margin: 3px 0; }
  .score-row .sname { color: #ddd; }
  .score-row .skd   { color: #f84; }
  .score-row.me .sname { color: #fff; font-weight: bold; }

  #chat-box {
    position: absolute; bottom: 80px; left: 30px;
    width: 340px; max-height: 150px;
    overflow: hidden; pointer-events: none;
    display: flex; flex-direction: column-reverse; gap: 3px;
  }
  .chat-msg {
    font-size: 12px; padding: 2px 6px;
    background: rgba(0,0,0,0.5);
    animation: chatFade 0.3s ease, chatFade2 0.5s 8s forwards;
  }
  @keyframes chatFade  { from { opacity: 0; } }
  @keyframes chatFade2 { to { opacity: 0; } }

  #chat-input-wrap {
    position: fixed; bottom: 20px; left: 30px;
    display: none; pointer-events: all;
  }
  #chat-input {
    background: rgba(0,0,0,0.8);
    border: 1px solid rgba(255,120,0,0.5);
    color: #fff; font-family: 'Share Tech Mono', monospace;
    font-size: 13px; padding: 6px 10px; width: 300px;
    outline: none;
  }

  #damage-vignette {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0) 100%);
    transition: background 0.1s; opacity: 0;
  }

  #dead-screen {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  #dead-screen h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px; letter-spacing: 8px;
    color: #f44; text-shadow: 0 0 40px #f44;
  }
  #dead-screen p { font-size: 14px; color: #888; letter-spacing: 3px; }

  /* ── LOBBY / CONNECT SCREEN ── */
  #lobby {
    position: fixed; inset: 0;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0;
  }

  .lobby-bg {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,80,0,0.04) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,80,0,0.04) 60px);
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { from { background-position: 0 0; } to { background-position: 60px 60px; } }

  .lobby-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 12vw, 110px);
    letter-spacing: 12px;
    background: linear-gradient(135deg, #ff6600, #ff2200, #ff8800);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 30px rgba(255,80,0,0.6));
    animation: titlePulse 3s ease-in-out infinite;
    position: relative; z-index: 1;
    margin-bottom: 8px;
  }
  @keyframes titlePulse {
    0%,100% { filter: drop-shadow(0 0 30px rgba(255,80,0,0.6)); }
    50%      { filter: drop-shadow(0 0 60px rgba(255,80,0,0.9)); }
  }

  .lobby-sub {
    font-size: 11px; letter-spacing: 6px; color: #555;
    margin-bottom: 50px; position: relative; z-index: 1;
  }

  .lobby-form {
    display: flex; flex-direction: column; gap: 14px;
    width: 360px; position: relative; z-index: 1;
  }

  .lobby-form label {
    font-size: 10px; letter-spacing: 3px; color: #666;
    display: block; margin-bottom: 4px;
  }

  .lobby-form input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,80,0,0.3);
    border-bottom: 2px solid rgba(255,80,0,0.6);
    color: #fff; font-family: 'Share Tech Mono', monospace;
    font-size: 15px; padding: 10px 14px;
    outline: none; transition: border-color 0.2s, background 0.2s;
  }
  .lobby-form input:focus {
    background: rgba(255,80,0,0.05);
    border-color: #f84; border-bottom-color: #f84;
  }
  .lobby-form input::placeholder { color: #444; }

  #connect-btn {
    margin-top: 10px;
    background: linear-gradient(135deg, #f84, #f44);
    border: none; color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 6px;
    padding: 14px; cursor: pointer;
    transition: transform 0.1s, filter 0.2s;
  }
  #connect-btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
  #connect-btn:active { transform: translateY(1px); }

  #connect-status {
    font-size: 11px; letter-spacing: 2px; color: #f84;
    text-align: center; min-height: 18px;
  }

  .lobby-controls {
    position: absolute; bottom: 30px;
    font-size: 11px; letter-spacing: 2px; color: #333;
    text-align: center;
  }
  .lobby-controls span { color: #555; margin: 0 12px; }

  /* weapon flash */
  #muzzle-flash {
    position: fixed; inset: 0; pointer-events: none;
    background: rgba(255,200,100,0.07);
    opacity: 0; transition: opacity 0.05s;
  }

  #fps-counter {
    position: fixed; top: 8px; right: 8px;
    font-size: 10px; color: #333; pointer-events: none;
  }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-bg"></div>
  <div class="lobby-title">DEATHMATCH</div>
  <div class="lobby-sub">MULTIPLAYER · 3D · ARENA</div>
  <div class="lobby-form">
    <div>
      <label>CALLSIGN</label>
      <input id="name-input" type="text" maxlength="16" placeholder="Enter your name" value="">
    </div>
    <div>
      <label>SERVER (Railway URL)</label>
      <input id="server-input" type="text" placeholder="yourapp.up.railway.app" value="">
    </div>
    <div id="connect-status"></div>
    <button id="connect-btn">ENTER ARENA</button>
  </div>
  <div class="lobby-controls">
    <span>WASD — Move</span>
    <span>MOUSE — Aim</span>
    <span>CLICK — Shoot</span>
    <span>T — Chat</span>
    <span>TAB — Scores</span>
  </div>
</div>

<!-- GAME -->
<canvas id="canvas"></canvas>

<div id="hud">
  <div id="crosshair"></div>

  <div id="healthbar-wrap">
    <div id="health-label">HEALTH</div>
    <div id="healthbar"><div id="healthfill"></div></div>
  </div>

  <div id="ammo-display">30<span>/90</span></div>

  <div id="killfeed"></div>
  <div id="scoreboard"><h3>SCOREBOARD</h3><div id="score-list"></div></div>

  <div id="chat-box"></div>
  <div id="chat-input-wrap">
    <input id="chat-input" type="text" maxlength="80" placeholder="Press Enter to send...">
  </div>

  <div id="damage-vignette"></div>
  <div id="muzzle-flash"></div>
  <div id="fps-counter">-- FPS</div>
</div>

<div id="dead-screen">
  <h2>YOU DIED</h2>
  <p id="killed-by-msg">Killed by ???</p>
  <p>Respawning...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
let ws = null;
let myId = null;
let myColor = '#ff4444';
let myName = 'Player';
let alive = true;
let health = 100;
let ammo = 30; let maxAmmo = 90; let clipSize = 30;
let reloading = false;

const remotePlayers = {};   // id → { mesh, nameMesh, healthBar, ... }
const bullets = [];         // active bullets
let kills = 0; let deaths = 0;

// ═══════════════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.025);
scene.background = new THREE.Color(0x0a0a0f);

const camera = new THREE.PerspectiveCamera(80, innerWidth / innerHeight, 0.05, 200);
camera.position.set(0, 1.8, 0);

const resize = () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
};
window.addEventListener('resize', resize);
resize();

// ── LIGHTING ──
const ambient = new THREE.AmbientLight(0x1a1a2e, 3);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xff8844, 2.5);
sun.position.set(30, 50, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 200;
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
scene.add(sun);

// Colored point lights for atmosphere
const lights = [
  [0xff2200, [-30, 4, -30]], [0x0044ff, [30, 4, 30]],
  [0xff8800, [30, 4, -30]], [0x00ffaa, [-30, 4, 30]]
];
lights.forEach(([color, pos]) => {
  const l = new THREE.PointLight(color, 2, 40);
  l.position.set(...pos);
  scene.add(l);
});

// ── MAP GEOMETRY ──
const MAP = 80;

// Floor
const floorGeo = new THREE.PlaneGeometry(MAP, MAP, 40, 40);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a1a, roughness: 0.9, metalness: 0.1
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Floor grid
const gridHelper = new THREE.GridHelper(MAP, 40, 0x222222, 0x111111);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Walls (boundary)
const wallMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.8 });
const makeWall = (x, y, z, w, h, d) => {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
  m.position.set(x, y, z);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
};
const H = 8, HH = H / 2;
makeWall(0, HH, -MAP/2, MAP, H, 1);
makeWall(0, HH,  MAP/2, MAP, H, 1);
makeWall(-MAP/2, HH, 0, 1, H, MAP);
makeWall( MAP/2, HH, 0, 1, H, MAP);

// Ceiling strips (open top atmosphere)
const ceilMat = new THREE.MeshStandardMaterial({ color: 0x0d0d1a, roughness: 1 });
const ceil = new THREE.Mesh(new THREE.PlaneGeometry(MAP, MAP), ceilMat);
ceil.rotation.x = Math.PI / 2;
ceil.position.y = H;
scene.add(ceil);

// Cover objects (boxes, pillars)
const coverMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.7, metalness: 0.3 });
const redMat   = new THREE.MeshStandardMaterial({ color: 0x4a1111, roughness: 0.6 });
const covers = [
  [0, 1, 0, 4, 2, 4],
  [-15, 1.5, -15, 3, 3, 3], [15, 1.5, 15, 3, 3, 3],
  [-15, 1.5, 15, 3, 3, 3],  [15, 1.5, -15, 3, 3, 3],
  [-28, 2, 0, 2, 4, 8],     [28, 2, 0, 2, 4, 8],
  [0, 2, -28, 8, 4, 2],     [0, 2, 28, 8, 4, 2],
  [-8, 0.75, -8, 6, 1.5, 1.5], [8, 0.75, 8, 6, 1.5, 1.5],
  [-8, 0.75, 8, 6, 1.5, 1.5],  [8, 0.75, -8, 6, 1.5, 1.5],
  [0, 1.5, 15, 1.5, 3, 1.5], [0, 1.5, -15, 1.5, 3, 1.5],
  [15, 1.5, 0, 1.5, 3, 1.5], [-15, 1.5, 0, 1.5, 3, 1.5],
];
covers.forEach(([x, y, z, w, h, d], i) => {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    i % 5 === 0 ? redMat : coverMat
  );
  m.position.set(x, y, z);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
});

// Collision boxes for cover (simplified AABB)
const colliders = [
  // boundary walls
  { minX: -MAP/2-1, maxX: MAP/2+1, minZ: -MAP/2-1, maxZ: -MAP/2+1 },
  { minX: -MAP/2-1, maxX: MAP/2+1, minZ:  MAP/2-1, maxZ:  MAP/2+1 },
  { minX: -MAP/2-1, maxX: -MAP/2+1, minZ: -MAP/2-1, maxZ: MAP/2+1 },
  { minX:  MAP/2-1, maxX:  MAP/2+1, minZ: -MAP/2-1, maxZ: MAP/2+1 },
  // center box
  { minX: -2, maxX: 2, minZ: -2, maxZ: 2 },
  // pillars
  { minX: -16.5, maxX: -13.5, minZ: -16.5, maxZ: -13.5 },
  { minX:  13.5, maxX:  16.5, minZ:  13.5, maxZ:  16.5 },
  { minX: -16.5, maxX: -13.5, minZ:  13.5, maxZ:  16.5 },
  { minX:  13.5, maxX:  16.5, minZ: -16.5, maxZ: -13.5 },
  { minX: -29, maxX: -27, minZ: -4, maxZ: 4 },
  { minX:  27, maxX:  29, minZ: -4, maxZ: 4 },
  { minX: -4, maxX: 4, minZ: -29, maxZ: -27 },
  { minX: -4, maxX: 4, minZ:  27, maxZ:  29 },
];

function collides(x, z, r = 0.5) {
  for (const c of colliders) {
    if (x + r > c.minX && x - r < c.maxX &&
        z + r > c.minZ && z - r < c.maxZ) return true;
  }
  return false;
}

// ── PLAYER BODY BUILDER ──
function makePlayerMesh(color) {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color), roughness: 0.4, metalness: 0.6 });

  // Torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.4), mat);
  torso.position.y = 0.4;
  torso.castShadow = true;
  group.add(torso);

  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.45), mat);
  head.position.y = 1.1;
  head.castShadow = true;
  group.add(head);

  // Visor
  const visorMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.8, roughness: 0.1 });
  const visor = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.1, 0.1), visorMat);
  visor.position.set(0, 1.12, 0.22);
  group.add(visor);

  // Legs
  const legMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color).multiplyScalar(0.6), roughness: 0.7 });
  [-0.15, 0.15].forEach(dx => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.55, 0.25), legMat);
    leg.position.set(dx, -0.27, 0);
    leg.castShadow = true;
    group.add(leg);
  });

  // Arms with gun
  const armMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color).multiplyScalar(0.7), roughness: 0.5 });
  const armR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.55, 0.22), armMat);
  armR.position.set(-0.42, 0.3, 0);
  group.add(armR);

  const armL = new THREE.Group();
  armL.position.set(0.42, 0.35, 0.1);
  const armLMesh = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, 0.22), armMat);
  armLMesh.castShadow = true;
  const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.12, 0.55), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.2 }));
  gunBody.position.set(0, 0.1, 0.2);
  const gunBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.4, 8), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 1 }));
  gunBarrel.rotation.x = Math.PI / 2;
  gunBarrel.position.set(0, 0.12, 0.62);
  armL.add(armLMesh); armL.add(gunBody); armL.add(gunBarrel);
  group.add(armL);

  // Name tag sprite
  const canvas2 = document.createElement('canvas');
  canvas2.width = 256; canvas2.height = 64;
  const ctx = canvas2.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, 256, 64);
  ctx.fillStyle = color;
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PLAYER', 128, 42);
  const tex = new THREE.CanvasTexture(canvas2);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sprite.scale.set(2, 0.5, 1);
  sprite.position.y = 1.9;
  group.add(sprite);
  group._nameSprite = sprite;
  group._nameTex = tex;
  group._nameCtx = ctx;
  group._nameCanvas = canvas2;

  // Health bar
  const hbGeo = new THREE.PlaneGeometry(0.8, 0.07);
  const hbBg = new THREE.Mesh(hbGeo, new THREE.MeshBasicMaterial({ color: 0x333333, side: THREE.DoubleSide }));
  hbBg.position.y = 1.65;
  hbBg.rotation.y = 0;
  group.add(hbBg);

  const hbFill = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.07), new THREE.MeshBasicMaterial({ color: 0xff3333, side: THREE.DoubleSide }));
  hbFill.position.set(-0, 1.65, 0.001);
  group._healthFill = hbFill;
  group.add(hbFill);

  return group;
}

function updatePlayerName(mesh, name, color) {
  const ctx = mesh._nameCtx;
  const canvas2 = mesh._nameCanvas;
  ctx.clearRect(0, 0, 256, 64);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 4, 256, 56);
  ctx.fillStyle = color;
  ctx.font = 'bold 26px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(name.toUpperCase(), 128, 40);
  mesh._nameTex.needsUpdate = true;
}

function updatePlayerHealth(mesh, hp) {
  if (!mesh._healthFill) return;
  const s = Math.max(0, hp / 100);
  mesh._healthFill.scale.x = s;
  mesh._healthFill.position.x = -0.4 * (1 - s);
  const c = new THREE.Color().setHSL(s * 0.33, 1, 0.5);
  mesh._healthFill.material.color = c;
}

// ── BULLET SYSTEM ──
const bulletGeo = new THREE.SphereGeometry(0.05, 6, 6);
const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffee44 });

function spawnBullet(pos, dir, isLocal, shooterId, shooterColor) {
  const mesh = new THREE.Mesh(bulletGeo, new THREE.MeshBasicMaterial({ color: isLocal ? 0xffee44 : new THREE.Color(shooterColor || '#ff8800') }));
  mesh.position.copy(pos);

  // Trail
  const trailGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 4);
  const trailMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.4 });
  const trail = new THREE.Mesh(trailGeo, trailMat);
  trail.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
  mesh.add(trail);

  scene.add(mesh);
  bullets.push({ mesh, dir: dir.clone().normalize(), speed: 60, life: 2, isLocal, shooterId });
}

// ── INPUT ──
const keys = {};
let yaw = 0; let pitch = 0;
let locked = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyT' && locked && alive) {
    openChat(); e.preventDefault();
  }
  if (e.code === 'KeyR' && !reloading && ammo < clipSize) reload();
  if (e.code === 'Escape' && chatOpen) closeChat();
});
document.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('click', () => {
  if (!locked && ws && alive) {
    canvas.requestPointerLock();
  }
});

document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === canvas;
});

document.addEventListener('mousemove', e => {
  if (!locked || !alive) return;
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
});

document.addEventListener('mousedown', e => {
  if (e.button === 0 && locked && alive && !chatOpen) shoot();
});

// ── SHOOTING ──
let shootCooldown = 0;
function shoot() {
  if (shootCooldown > 0 || reloading) return;
  if (ammo <= 0) { reload(); return; }

  ammo--;
  updateAmmoHUD();
  shootCooldown = 0.1;

  // Muzzle flash
  const flash = document.getElementById('muzzle-flash');
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 50);

  // Crosshair flash
  const ch = document.getElementById('crosshair');
  ch.classList.add('hit');
  setTimeout(() => ch.classList.remove('hit'), 80);

  // Bullet direction from camera
  const dir = new THREE.Vector3(0, 0, -1);
  dir.applyEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

  const pos = camera.position.clone().add(dir.clone().multiplyScalar(0.5));

  spawnBullet(pos, dir, true, myId, myColor);

  // Send to server
  if (ws) {
    ws.send(JSON.stringify({
      type: 'shoot',
      x: pos.x, y: pos.y, z: pos.z,
      dirX: dir.x, dirY: dir.y, dirZ: dir.z
    }));
  }

  // Check hits (local raycasting against remote players)
  const raycaster = new THREE.Raycaster(camera.position.clone(), dir, 0, 150);
  const hitMeshes = [];
  Object.values(remotePlayers).forEach(rp => {
    rp.mesh.traverse(child => { if (child.isMesh) hitMeshes.push(child); });
  });

  const hits = raycaster.intersectObjects(hitMeshes);
  if (hits.length > 0) {
    // Find which player was hit
    const hitObj = hits[0].object;
    for (const [id, rp] of Object.entries(remotePlayers)) {
      let found = false;
      rp.mesh.traverse(c => { if (c === hitObj) found = true; });
      if (found && rp.alive) {
        ws.send(JSON.stringify({ type: 'hit', targetId: id, damage: 25 }));

        // Hit marker
        const ch2 = document.getElementById('crosshair');
        ch2.style.filter = 'drop-shadow(0 0 8px #f44) brightness(3)';
        setTimeout(() => ch2.style.filter = '', 150);
        break;
      }
    }
  }
}

function reload() {
  if (reloading || ammo === clipSize) return;
  reloading = true;
  const ammoEl = document.getElementById('ammo-display');
  ammoEl.innerHTML = 'RELOADING<span>...</span>';
  setTimeout(() => {
    const need = clipSize - ammo;
    const take = Math.min(need, maxAmmo - clipSize);
    ammo = Math.min(clipSize, ammo + need);
    reloading = false;
    updateAmmoHUD();
  }, 1500);
}

function updateAmmoHUD() {
  const el = document.getElementById('ammo-display');
  el.innerHTML = `${ammo}<span>/${maxAmmo - clipSize}</span>`;
}

// ── PLAYER MOVEMENT ──
const velocity = new THREE.Vector3();
const SPEED = 10;
const GRAVITY = -20;
let velY = 0;
let onGround = true;

function updateMovement(dt) {
  if (!alive) return;

  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right   = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw));

  let moved = false;
  const move = new THREE.Vector3();

  if (keys['KeyW'] || keys['ArrowUp'])    { move.add(forward); moved = true; }
  if (keys['KeyS'] || keys['ArrowDown'])  { move.sub(forward); moved = true; }
  if (keys['KeyA'] || keys['ArrowLeft'])  { move.sub(right);   moved = true; }
  if (keys['KeyD'] || keys['ArrowRight']) { move.add(right);   moved = true; }

  if (move.lengthSq() > 0) move.normalize();
  move.multiplyScalar(SPEED * dt);

  // Gravity
  if (!onGround) velY += GRAVITY * dt;
  else velY = 0;
  if (keys['Space'] && onGround) { velY = 8; onGround = false; }

  const nx = camera.position.x + move.x;
  const nz = camera.position.z + move.z;

  if (!collides(nx, camera.position.z)) camera.position.x = nx;
  if (!collides(camera.position.x, nz)) camera.position.z = nz;

  camera.position.y += velY * dt;
  if (camera.position.y <= 1.8) {
    camera.position.y = 1.8;
    velY = 0;
    onGround = true;
  }

  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
}

// ── NETWORK ──
function connect(serverUrl, playerName) {
  myName = playerName || 'Player';
  const status = document.getElementById('connect-status');
  status.textContent = 'Connecting...';

  const proto = serverUrl.startsWith('localhost') ? 'ws' : 'wss';
  const url = `${proto}://${serverUrl}`;

  try {
    ws = new WebSocket(url);
  } catch(e) {
    status.textContent = 'Invalid server URL';
    return;
  }

  ws.onopen = () => {
    status.textContent = 'Connected! Entering arena...';
    ws.send(JSON.stringify({ type: 'set_name', name: myName }));
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    status.textContent = 'Disconnected from server.';
    document.getElementById('lobby').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
    document.exitPointerLock();
    locked = false;
    // Cleanup remote players
    Object.keys(remotePlayers).forEach(removeRemotePlayer);
  };

  ws.onerror = () => {
    status.textContent = 'Cannot connect. Check URL.';
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'welcome':
      myId = msg.id;
      myColor = msg.color;
      camera.position.set(msg.spawn.x, msg.spawn.y, msg.spawn.z);
      // Add existing players
      Object.values(msg.players).forEach(addRemotePlayer);
      // Show game
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('hud').style.display = 'block';
      canvas.requestPointerLock();
      break;

    case 'player_joined':
      addRemotePlayer(msg.player);
      addChat(`${msg.player.name} joined the arena`, '#888');
      break;

    case 'player_left':
      removeRemotePlayer(msg.id);
      break;

    case 'player_moved':
      if (remotePlayers[msg.id]) {
        const rp = remotePlayers[msg.id];
        rp.targetX = msg.x; rp.targetY = msg.y; rp.targetZ = msg.z;
        rp.targetRotY = msg.rotY;
      }
      break;

    case 'player_renamed':
      if (remotePlayers[msg.id]) {
        remotePlayers[msg.id].name = msg.name;
        updatePlayerName(remotePlayers[msg.id].mesh, msg.name, remotePlayers[msg.id].color);
      }
      break;

    case 'bullet':
      if (msg.shooterId !== myId) {
        const pos = new THREE.Vector3(msg.x, msg.y, msg.z);
        const dir = new THREE.Vector3(msg.dirX, msg.dirY, msg.dirZ);
        spawnBullet(pos, dir, false, msg.shooterId, msg.color);
      }
      break;

    case 'you_hit':
      health = msg.health;
      updateHealthHUD();
      showDamageVignette();
      break;

    case 'damage':
      if (remotePlayers[msg.targetId]) {
        remotePlayers[msg.targetId].health = msg.health;
        updatePlayerHealth(remotePlayers[msg.targetId].mesh, msg.health);
      }
      break;

    case 'kill':
      addKillFeed(msg.killerName, msg.victimName, msg.killerId === myId);
      if (msg.killerId === myId) kills = msg.killerKills;
      if (msg.victimId === myId) {
        deaths = msg.victimDeaths;
        die(msg.killerName);
      }
      if (remotePlayers[msg.victimId]) {
        remotePlayers[msg.victimId].alive = false;
      }
      updateScoreboard();
      break;

    case 'respawn':
      if (msg.id === myId) {
        health = 100; alive = true; ammo = clipSize;
        camera.position.set(msg.x, msg.y, msg.z);
        updateHealthHUD(); updateAmmoHUD();
        document.getElementById('dead-screen').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        canvas.requestPointerLock();
      } else if (remotePlayers[msg.id]) {
        const rp = remotePlayers[msg.id];
        rp.alive = true; rp.health = 100;
        rp.mesh.position.set(msg.x, 0, msg.z);
        rp.targetX = msg.x; rp.targetY = msg.y; rp.targetZ = msg.z;
        rp.mesh.visible = true;
        updatePlayerHealth(rp.mesh, 100);
      }
      break;

    case 'chat':
      addChat(`${msg.name}: ${msg.text}`, msg.color);
      break;

    case 'player_state_update':
      // bulk update
      break;
  }
}

function addRemotePlayer(data) {
  if (remotePlayers[data.id]) return;
  const mesh = makePlayerMesh(data.color);
  mesh.position.set(data.x, 0, data.z);
  scene.add(mesh);
  updatePlayerName(mesh, data.name, data.color);
  remotePlayers[data.id] = {
    mesh, id: data.id, name: data.name, color: data.color,
    targetX: data.x, targetY: data.y, targetZ: data.z,
    targetRotY: data.rotY || 0,
    health: data.health, alive: data.alive,
    kills: data.kills, deaths: data.deaths
  };
  updateScoreboard();
}

function removeRemotePlayer(id) {
  if (remotePlayers[id]) {
    scene.remove(remotePlayers[id].mesh);
    delete remotePlayers[id];
    updateScoreboard();
  }
}

// ── HUD UPDATES ──
function updateHealthHUD() {
  const pct = Math.max(0, health) / 100;
  document.getElementById('healthfill').style.width = (pct * 100) + '%';
  const r = Math.round(255 * (1 - pct));
  const g = Math.round(255 * pct);
  document.getElementById('healthfill').style.background = `linear-gradient(90deg, rgb(${r},${g},0), rgb(${r+30},${g},0))`;
}

function showDamageVignette() {
  const v = document.getElementById('damage-vignette');
  v.style.opacity = '1';
  v.style.background = 'radial-gradient(ellipse at center, transparent 40%, rgba(255,0,0,0.5) 100%)';
  setTimeout(() => { v.style.opacity = '0'; }, 300);
}

function addKillFeed(killer, victim, isMe) {
  const kf = document.getElementById('killfeed');
  const el = document.createElement('div');
  el.className = 'killfeed-entry';
  el.style.borderLeftColor = isMe ? '#ffaa00' : '#f44';
  el.innerHTML = `<span style="color:${isMe ? '#ffaa00' : '#ff6666'}">${killer}</span> ☠ <span style="color:#ccc">${victim}</span>`;
  kf.prepend(el);
  setTimeout(() => el.remove(), 3200);
}

function die(killedBy) {
  alive = false;
  health = 0;
  document.getElementById('killed-by-msg').textContent = `Killed by ${killedBy}`;
  document.getElementById('dead-screen').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
  document.exitPointerLock();
  locked = false;
  deaths++;
  updateScoreboard();
}

function updateScoreboard() {
  const list = document.getElementById('score-list');
  const entries = [
    { id: 'me', name: myName, kills, deaths, isMe: true },
    ...Object.values(remotePlayers).map(rp => ({ id: rp.id, name: rp.name, kills: rp.kills || 0, deaths: rp.deaths || 0, isMe: false }))
  ];
  entries.sort((a, b) => b.kills - a.kills);
  list.innerHTML = entries.map(e =>
    `<div class="score-row${e.isMe ? ' me' : ''}">
      <span class="sname">${e.name.substr(0,12)}</span>
      <span class="skd">${e.kills}/${e.deaths}</span>
    </div>`
  ).join('');
}

// ── CHAT ──
let chatOpen = false;
function openChat() {
  chatOpen = true;
  const wrap = document.getElementById('chat-input-wrap');
  const input = document.getElementById('chat-input');
  wrap.style.display = 'block';
  input.value = '';
  input.focus();
  document.exitPointerLock();
  locked = false;
}
function closeChat() {
  chatOpen = false;
  document.getElementById('chat-input-wrap').style.display = 'none';
  canvas.requestPointerLock();
}
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.code === 'Enter') {
    const text = e.target.value.trim();
    if (text && ws) ws.send(JSON.stringify({ type: 'chat', text }));
    closeChat();
    e.preventDefault();
  }
  if (e.code === 'Escape') closeChat();
  e.stopPropagation();
});

function addChat(text, color) {
  const box = document.getElementById('chat-box');
  const el = document.createElement('div');
  el.className = 'chat-msg';
  el.innerHTML = `<span style="color:${color}">${text}</span>`;
  box.prepend(el);
  setTimeout(() => el.remove(), 9000);
}

// ── SEND POSITION ──
let lastSent = 0;
function sendPosition() {
  const now = performance.now();
  if (now - lastSent < 50) return; // 20Hz
  lastSent = now;
  if (ws && ws.readyState === WebSocket.OPEN && alive) {
    ws.send(JSON.stringify({
      type: 'move',
      x: camera.position.x,
      y: camera.position.y,
      z: camera.position.z,
      rotY: yaw
    }));
  }
}

// ── CONNECT BUTTON ──
document.getElementById('connect-btn').addEventListener('click', () => {
  const serverUrl = document.getElementById('server-input').value.trim();
  const playerName = document.getElementById('name-input').value.trim() || 'Player';
  if (!serverUrl) {
    document.getElementById('connect-status').textContent = 'Enter a server URL';
    return;
  }
  connect(serverUrl.replace(/^wss?:\/\//, ''), playerName);
});

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.code === 'Enter') document.getElementById('server-input').focus();
});
document.getElementById('server-input').addEventListener('keydown', e => {
  if (e.code === 'Enter') document.getElementById('connect-btn').click();
});

// ── GAME LOOP ──
let last = 0;
let frames = 0; let fpsTime = 0;

function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  // FPS
  frames++;
  fpsTime += dt;
  if (fpsTime >= 0.5) {
    document.getElementById('fps-counter').textContent = Math.round(frames / fpsTime) + ' FPS';
    frames = 0; fpsTime = 0;
  }

  // Shoot cooldown
  if (shootCooldown > 0) shootCooldown -= dt;

  updateMovement(dt);
  sendPosition();

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.life -= dt;
    b.mesh.position.addScaledVector(b.dir, b.speed * dt);
    if (b.life <= 0 || b.mesh.position.y < 0) {
      scene.remove(b.mesh);
      bullets.splice(i, 1);
    }
  }

  // Interpolate remote players
  Object.values(remotePlayers).forEach(rp => {
    if (!rp.alive) { rp.mesh.visible = false; return; }
    rp.mesh.visible = true;
    rp.mesh.position.x += (rp.targetX - rp.mesh.position.x) * 0.25;
    rp.mesh.position.y += ((rp.targetY - 1.8) - rp.mesh.position.y) * 0.25;
    rp.mesh.position.z += (rp.targetZ - rp.mesh.position.z) * 0.25;
    rp.mesh.rotation.y += (rp.targetRotY - rp.mesh.rotation.y) * 0.2;

    // Always face name/health toward camera
    const dx = camera.position.x - rp.mesh.position.x;
    const dz = camera.position.z - rp.mesh.position.z;
    if (rp.mesh._nameSprite) {
      rp.mesh._nameSprite.rotation.y = -rp.mesh.rotation.y;
    }
    if (rp.mesh._healthFill) {
      rp.mesh._healthFill.lookAt(camera.position.clone().sub(rp.mesh.position));
    }
  });

  renderer.render(scene, camera);
}

requestAnimationFrame(gameLoop);

// Pre-fill a saved name
const savedName = localStorage.getItem('dm_name');
if (savedName) document.getElementById('name-input').value = savedName;
document.getElementById('name-input').addEventListener('change', e => {
  localStorage.setItem('dm_name', e.target.value);
});

const savedServer = localStorage.getItem('dm_server');
if (savedServer) document.getElementById('server-input').value = savedServer;
document.getElementById('server-input').addEventListener('change', e => {
  localStorage.setItem('dm_server', e.target.value);
});
</script>
